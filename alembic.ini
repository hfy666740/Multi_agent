# alembic.ini — Alembic 数据库迁移配置文件
# 技术栈: Alembic (数据库迁移), SQLAlchemy (ORM)
# 用途: 配置数据库连接和迁移脚本路径

[alembic]
script_location = alembic
prepend_sys_path = .

# 数据库连接 URL — 优先从环境变量读取，否则使用默认值
sqlalchemy.url = postgresql://postgres:123456@localhost:5432/agent_chat

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
